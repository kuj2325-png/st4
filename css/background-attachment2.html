<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{margin: 0; padding: 0;}
    .container-wrap{
      margin: 0 50px;
      background-color: #ccc;}
      .container-wrap > section{
        box-sizing: border-box;
        width: 100%;
        padding: 1em;
        height: 100vh;
      }
      .section1{background-color: #f86;}
      .section2{background-color: #68f;}
      .section3{background-color: #6f8;}
  </style>
</head>
<body>
  <div class="container-wrap">
  <section class="section1">
    <p class="title">section3</p>
  </section>
  <section class="section2">
    <p class="title">section3</p>
  </section>
  <section class="section3">
    <p class="title">section3</p>
  </section>
  </div>
</body>
</html>
