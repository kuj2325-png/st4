<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;}
    .media-box{max-width: 600px;}
    .media-box .iframe-wrap{
      position: relative;
      padding-top: 56.25%;
      background-color: #f00;
    }
    /* .iframe-wrap{ */
      /* background-color: #ccc; */
    /* } */
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      width: 100%; height: 100%;
      position: absolute;
      left: 0; top: 0;
    }
    .media-box .iframe-wrap iframe{
      position: absolute;
      left: 0; top: 0;
      width: 100; height: 100;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
    <iframe width="560" height="315" src="https://www.youtube.com/embed/Kz2BsKX04ek?si=oD-wp3eAhyAKarAu" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      <div class="box">box</div>
    </div>
  </div>
</body>
</html>
