  <style>
    *{margin: 0; padding: 0; box-sizing: border-box;}
    .wrap{
      width: 85%;
      margin: 0 auto;
      background-color: #ccc;
      padding: 30px;
      border: 10px dashed #999;
    }
    .parent{padding: 10px;}
    .parent:nth-child(1){
      background-color: #f86;
    }
    .parent:nth-child(2){

    }
    .parent:nth-child(3){

    }
    .parent:nth-child(4){

    }
    .parent:nth-child(5){
      background-color: #c8f;
    }
    .parent .child{
      width: 50px; height: 50px;
      padding: 10px;
    }
    .parent .parent:nth-child(1){
      background-color: #fff;
    }
    .parent .parent:nth-child(2){
      background-color: #0dd;
    }
  </style>
</head>
