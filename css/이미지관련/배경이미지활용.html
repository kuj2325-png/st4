<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  <style>
    *{margin: 0; padding: 0;}
    .wrap{}
    .visual-section{
      width: 100%;
      height: 100vh;
      background-color: #fcc;
      background-image: url(../images/background-test.jpg);
      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto;
    }
    .visual-section .text-wrap{
      background-color: #ccc;
    }
    .visual-section .text-wrap .title{
      font-family: "noto-sans kr"
      ,sans-serif;
      font-size: 4rem;
      font-weight: 100;
      color: #8bffb7;
    }
    .visual-section .text-wrap .desc{
      font-family: "noto-sans kr"
      ,sans-serif;
      font-size: 1rem;
      font-weight: 200;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <div class="text-wrap">
        <p class="title">Lorem, ipsum dolor.</p>
        <p class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. <br>Dolorem, odio et aspernatur harum ut provident. Esse quae numquam eius consequatur?</p>
      </div>
    </div>
  </div>
</body>
</html>
