<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../reset.css">
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<style>
  .section_full{
    width: 100% !important;
    max-width: 100% !important;

  }
  .visual-section{
    background-color: #f00;
  }
  .visual-section .swiper-slide{}
  .visual-section .swiper-slide a{
    display: block;
  }
  .visual-section .swiper-slide a img{
    display: block;
    width: 100%;
  }
  .swiper {
  width: 100%;
   
}
.visual-section .swiper .swiper-pagination-bullet{
background-color: transparent;
height: 12px; width: 12px;
border-radius: 50%;
height: 4px; width: 8px;
border-radius: 0;
background-color: #fff;
opacity: 0.4;
margin-right: 1rem;
border: 2px solid #fff;
}
.visual-section .swiper .swiper-pagination-bullet-active{
  /* background-color: #8f8; */
  background-color: #fff;
  opacity: 1;
  width: 24px;
}
</style>
</head>
<body>
  <!-- Slider main container -->
<div class="visual-section section_full section">
  <div class="swiper swiper1">
    <!-- Additional required wrapper -->
    <div class="swiper-wrapper">
      <!-- Slides -->
      <div class="swiper-slide">
        <a href="">
          <img src="images/slide1.png" alt="배너의 설명을 작성해주세요">
        </a>
      </div>
      <div class="swiper-slide">
        <a href="">
          <img src="images/slide2.png" alt="배너의 설명을 작성해주세요">
      </div>
      <div class="swiper-slide"><a href="">
          <img src="images/slide3.png" alt="배너의 설명을 작성해주세요"></div>
      ...
    </div>
    <!-- If we need pagination -->
    <div class="swiper-pagination"></div>
  
    <!-- If we need navigation buttons -->
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  
    <!-- If we need scrollbar -->
    <div class="swiper-scrollbar"></div>
  </div>
</div>
<script>
  const swiper = new Swiper('.swiper1', {
  // Optional parameters
  direction: 'horizontal',
  loop: true,

  // If we need pagination
  pagination: {
    el: '.swiper-pagination',
  },

  // Navigation arrows
  navigation: {
    nextEl: '.swiper-button-next',
    prevEl: '.swiper-button-prev',
  },

  // And if we need scrollbar
  scrollbar: {
    el: '.swiper-scrollbar',
  },
});
</script>
</body>
</html>
