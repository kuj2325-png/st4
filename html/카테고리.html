<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 
  ul 순서없는 목록
  li 목록 아이템
  -->
  <!-- 
  <태그>내용</태그>
  내용  : 택스트 또는 태그
   -->

  <nav>
    <ul>
      <li>Best100</li>
      <li>NEW 10%</li>
      <li>DRESS</li>
      <li>OUTER</li>
      <li>TOP
        <UL>
          <!-- 중분류 -->
           <LI>티</LI>
           <LI>셔츠</LI>
           <LI>블라우스</LI>
        </UL>
      </li>
      <li>BOTTOM
        <ul>
          <li>팬츠</li>
          <li>스커트</li>
        </ul>
      </li>
    </ul>
  </nav>
</body>
</html>
